<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9d1e"/>
      <stop offset="0.5" stop-color="#ff7a00"/>
      <stop offset="1" stop-color="#c85400"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3cf"/>
      <stop offset="1" stop-color="#f4c95d"/>
    </linearGradient>
  </defs>

  <!-- saffron rounded tile -->
  <rect x="2" y="2" width="96" height="96" rx="24" fill="url(#tile)"/>
  <rect x="2.5" y="2.5" width="95" height="95" rx="23.5" fill="none" stroke="#ffe6b4" stroke-opacity="0.55"/>

  <!-- lamp flame teardrop -->
  <path d="M50 16 C62 35 78 45 78 62 a28 28 0 1 1 -56 0 C22 45 38 35 50 16 Z" fill="url(#flame)"/>
  <!-- flame tip -->
  <path d="M50 10 C53 18 53 23 50 28 C47 23 47 18 50 10 Z" fill="#fff3cf"/>

  <!-- Om mark -->
  <text x="50" y="76" text-anchor="middle" font-size="40" font-weight="700"
    font-family="'Noto Sans Devanagari','Nirmala UI',sans-serif" fill="#c85400">ॐ</text>
</svg>
